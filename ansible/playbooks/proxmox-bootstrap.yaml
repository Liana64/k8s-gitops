---
- name: Bootstrap Proxmox admin users
  hosts: proxmox
  gather_facts: true
  force_handlers: true
  # Connects as ansible_user (default `ansible` per group_vars). On a fresh
  # host where the ansible account doesn't exist yet, override the first
  # run with `-u root -k` (or set ansible_user=root ad-hoc). become uses
  # NOPASSWD sudo that this playbook itself configures.
  become: true
  handlers:
    - name: Reload sshd
      ansible.builtin.service:
        name: ssh
        state: reloaded
  tasks:
    - name: Install base packages
      ansible.builtin.apt:
        name: "{{ proxmox_base_packages }}"
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Ensure user accounts exist
      ansible.builtin.user:
        name: "{{ item.name }}"
        groups: sudo
        append: true
        shell: /bin/bash
        state: present
        create_home: true
      loop: "{{ proxmox_users }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Install authorized_keys
      ansible.posix.authorized_key:
        user: "{{ item.0.name }}"
        key: "{{ item.1 }}"
        state: present
        exclusive: false
      loop: "{{ proxmox_users | product(proxmox_authorized_keys) | list }}"
      loop_control:
        label: "{{ item.0.name }}"
      when: proxmox_authorized_keys | length > 0

    - name: Passwordless sudo for service accounts
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/10-{{ item.name }}"
        owner: root
        group: root
        mode: "0440"
        content: "{{ item.name }} ALL=(ALL) NOPASSWD:ALL\n"
        validate: "visudo -cf %s"
      loop: "{{ proxmox_users }}"
      loop_control:
        label: "{{ item.name }}"
      when: item.nopasswd | default(false)

    - name: Harden sshd configuration
      ansible.builtin.copy:
        dest: /etc/ssh/sshd_config.d/00-hardening.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          # Managed by ansible/playbooks/proxmox-bootstrap.yaml
          PermitRootLogin no
          PasswordAuthentication no
          KbdInteractiveAuthentication no
          PermitEmptyPasswords no
          X11Forwarding no
          MaxAuthTries 3
          ClientAliveInterval 300
          ClientAliveCountMax 2
        validate: "sshd -t -f %s"
      notify: Reload sshd

    - name: Enable pve-no-subscription repo
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/proxmox.sources
        owner: root
        group: root
        mode: "0644"
        content: |
          Types: deb
          URIs: http://download.proxmox.com/debian/pve
          Suites: {{ ansible_distribution_release }}
          Components: pve-no-subscription
          Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
          Enabled: true

    - name: Disable pve-enterprise repo
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/pve-enterprise.sources
        owner: root
        group: root
        mode: "0644"
        content: |
          Types: deb
          URIs: https://enterprise.proxmox.com/debian/pve
          Suites: {{ ansible_distribution_release }}
          Components: pve-enterprise
          Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
          Enabled: false

    - name: Disable ceph-enterprise repo
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/ceph.sources
        owner: root
        group: root
        mode: "0644"
        content: |
          Types: deb
          URIs: https://enterprise.proxmox.com/debian/ceph-squid
          Suites: {{ ansible_distribution_release }}
          Components: enterprise
          Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
          Enabled: false

    - name: Install unattended-upgrades
      ansible.builtin.apt:
        name: unattended-upgrades
        state: present
        update_cache: true
        cache_valid_time: 0

    - name: Enable security-only unattended upgrades
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        owner: root
        group: root
        mode: "0644"
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";
          APT::Periodic::AutocleanInterval "7";
