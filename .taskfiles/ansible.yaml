---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

env:
  ANSIBLE_CONFIG: "{{.ROOT_DIR}}/ansible/ansible.cfg"
  # SOPS_AGE_KEY_FILE is inherited from the root Taskfile.

tasks:
  deps:
    desc: Install ansible collections (community.sops, community.general, ansible.posix)
    dir: "{{.ROOT_DIR}}/ansible"
    cmd: ansible-galaxy collection install -r requirements.yml
    status:
      - test -d {{.ROOT_DIR}}/ansible/.ansible/collections/ansible_collections/community/sops
      - test -d {{.ROOT_DIR}}/ansible/.ansible/collections/ansible_collections/community/general
      - test -d {{.ROOT_DIR}}/ansible/.ansible/collections/ansible_collections/ansible/posix

  sync-inventory:
    desc: Copy ipv4_address and volume_device from tofu output into ansible vars
    dir: "{{.ROOT_DIR}}/ansible"
    cmd: |
      set -e
      IP=$(tofu -chdir={{.ROOT_DIR}}/tofu/projects/infra-edge output -raw ipv4_address)
      DEV=$(tofu -chdir={{.ROOT_DIR}}/tofu/projects/infra-edge output -raw volume_device)
      yq -i ".all.children.edge.hosts.infra-edge.ansible_host = \"$IP\"" hosts.yml
      yq -i ".edge_data_device = \"$DEV\"" host_vars/infra-edge.yml
      echo "Set infra-edge ansible_host = $IP"
      echo "Set edge_data_device    = $DEV"
    preconditions:
      - msg: tofu project not applied yet
        sh: test -f {{.ROOT_DIR}}/tofu/projects/infra-edge/terraform.tfstate

  ping:
    desc: Ansible ping a host group, e.g. `task ansible:ping -- proxmox`
    dir: "{{.ROOT_DIR}}/ansible"
    deps: [deps]
    cmd: ansible {{.CLI_ARGS | default "all"}} -m ansible.builtin.ping

  lint:
    desc: ansible-lint over playbooks and roles
    dir: "{{.ROOT_DIR}}/ansible"
    cmd: ansible-lint playbooks/ roles/

  play:
    desc: Run a playbook, e.g. `task ansible:play -- playbooks/harden.yaml`
    dir: "{{.ROOT_DIR}}/ansible"
    deps: [deps]
    cmd: ansible-playbook {{.CLI_ARGS}}

  site:
    desc: Full harden + edge deploy
    dir: "{{.ROOT_DIR}}/ansible"
    deps: [deps]
    cmd: ansible-playbook playbooks/site.yaml {{.CLI_ARGS}}
