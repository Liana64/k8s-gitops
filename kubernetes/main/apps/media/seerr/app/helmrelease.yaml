---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seerr
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      seerr:
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: ghcr.io/seerr-team/seerr
              tag: 3.1.1@sha256:d535391db3b5a22ce02241e6d7a50ca714e75d927e46aa20456b77fa051cbf52
            env:
              TZ: ${TIMEZONE}
              PORT: &port 5055
              forceIpv4First: true
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /status
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
            resources:
              requests:
                cpu: 10m
                memory: 250Mi
              limits:
                memory: 512Mi

      prune-cache:
        type: cronjob
        cronjob:
          schedule: "@weekly"
          backoffLimit: 0
          concurrencyPolicy: Forbid
          successfulJobsHistory: 0
          failedJobsHistory: 1
        pod:
          restartPolicy: Never
        containers:
          app:
            image:
              repository: docker.io/library/busybox
              tag: "1.37.0"
            command:
              - /bin/sh
              - -c
              - >-
                find /app/config/cache/images -type f -mtime +30 -delete;
                find /app/config/cache/images -mindepth 1 -type d -empty -delete
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 32Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        controller: seerr
        ports:
          http:
            port: *port

    ingress:
      app:
        className: traefik-external
        annotations:
          cert-manager.io/cluster-issuer: "letsencrypt-production"
          external-dns.alpha.kubernetes.io/target: "external.${SECRET_DOMAIN}"
          traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
          traefik.ingress.kubernetes.io/router.middlewares: "networking-traefik-middleware-chain-no-auth-anubis@kubernetescrd"
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Media
          gethomepage.dev/name: seerr
          gethomepage.dev/description: Media requests
          gethomepage.dev/icon: seerr
          #gethomepage.dev/widget.type: "seerr"
          #gethomepage.dev/widget.key: "${HOMEPAGE_VAR_JELLYSEERR_API_KEY}"
          #gethomepage.dev/widget.url: &host "requests.${SECRET_EXTERNAL_DOMAIN}"
        hosts:
          - host: &host "requests.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
        tls:
          - secretName: jellyseerr-requests-tls
            hosts: [*host]

      # Route seerr assets without anubis
      assets:
        className: traefik-external
        annotations:
          traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
          traefik.ingress.kubernetes.io/router.middlewares: "networking-traefik-middleware-chain-no-auth@kubernetescrd"
        hosts:
          - host: *host
            paths:
              - path: /imageproxy
                pathType: Prefix
                service:
                  identifier: app
                  port: http
              - path: /avatarproxy
                pathType: Prefix
                service:
                  identifier: app
                  port: http
              - path: /_next
                pathType: Prefix
                service:
                  identifier: app
                  port: http
        tls:
          - secretName: jellyseerr-requests-tls
            hosts: [*host]

    persistence:
      config:
        storageClass: cluster-nvme
        accessMode: ReadWriteOnce
        size: 1Gi
        retain: true
        globalMounts:
          - path: /app/config
      cache:
        storageClass: cluster-nvme
        accessMode: ReadWriteOnce
        size: 512Mi
        globalMounts:
          - path: /app/config/cache
      tmp:
        type: emptyDir
        advancedMounts:
          seerr:
            app:
              - path: /app/config/logs
                subPath: logs
              - path: /tmp
                subPath: tmp
              - path: /app/.next/cache
                subPath: next-cache
