---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-1
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:17.0-30
  primaryUpdateStrategy: unsupervised
  storage:
    size: 128Gi
    storageClass: cluster-nvme
  superuserSecret:
    name: cloudnative-pg-secret
  enableSuperuserAccess: true
  postgresql:
    parameters:
      max_connections: "512"
      shared_buffers: 256MB
  nodeMaintenanceWindow:
    inProgress: false
    reusePVC: true
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 2Gi
  monitoring:
    enablePodMonitor: true
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: postgres-1-backup
#  extensions:
#    - name: vector
