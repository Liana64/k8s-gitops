---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app dcgm-exporter
  namespace: flux-system
spec:
  targetNamespace: observability
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  path: ./kubernetes/main/apps/observability/dcgm-exporter/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-infra
  dependsOn:
    - name: kube-prometheus-stack
  wait: false
  interval: 30m
  retryInterval: 1m
  timeout: 5m
