---
apiVersion: v1
kind: ConfigMap
metadata:
  name: radicale-config
data:
  config: |
    [server]
    hosts = 0.0.0.0:5232

    [auth]
    type = htpasswd
    htpasswd_filename = /etc/radicale/users
    htpasswd_encryption = bcrypt

    [storage]
    filesystem_folder = /var/lib/radicale/collections

    [logging]
    level = info
