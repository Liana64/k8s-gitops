---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: thunderbolt-routes
  namespace: kube-system
  labels:
    app: thunderbolt-routes
spec:
  selector:
    matchLabels:
      app: thunderbolt-routes
  template:
    metadata:
      labels:
        app: thunderbolt-routes
    spec:
      hostNetwork: true
      nodeSelector:
        hardware/model: ms-01
      tolerations:
        - operator: Exists
      initContainers:
        - name: setup-routes
          image: alpine:3.23
          securityContext:
            privileged: true
            capabilities:
              add: ["NET_ADMIN"]
          command:
            - /bin/sh
            - -c
            - |
              set -e
              apk add --no-cache iproute2 > /dev/null 2>&1

              MY_IP=$(ip -4 addr show dev eth1 | grep 'inet ' | grep -o '10\.10\.10\.[0-9]*' | head -1 | cut -d. -f4)

              if [ "$MY_IP" = "11" ]; then
                PEER="10.10.10.12"
                PEER_CIDR="10.244.2.0/24"
              elif [ "$MY_IP" = "12" ]; then
                PEER="10.10.10.11"
                PEER_CIDR="10.244.1.0/24"
              else
                echo "Unknown Thunderbolt IP, skipping"
                exit 0
              fi

              ip route replace $PEER_CIDR via "$PEER" dev eth1
              echo "Thunderbolt route: $PEER_CIDR via $PEER on eth1"
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10
          resources:
            requests:
              cpu: 1m
              memory: 16Mi
            limits:
              memory: 16Mi
