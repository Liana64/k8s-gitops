---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app forgejo
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: forgejo
    namespace: flux-system
  values:
    image:
      rootless: true
    redis-cluster:
      enabled: false
    valkey-cluster:
      enabled: false
    postgresql:
      enabled: false
    postgresql-ha:
      enabled: false
    memcached:
      enabled: false
    persistence:
      enabled: true
      create: true
      claimName: *app
      storageClass: cluster-nvme
      size: 20Gi
      accessModes: [ReadWriteOnce]
    gitea:
      admin:
        username: ""
      config:
        APP_NAME: Forgejo
        RUN_MODE: prod
        server:
          DOMAIN: &host "git.${PUBLIC_DOMAIN}"
          ROOT_URL: https://git.${PUBLIC_DOMAIN}
          HTTP_PORT: 3000
          SSH_DOMAIN: git.${PUBLIC_DOMAIN}
          SSH_PORT: 22
          SSH_LISTEN_PORT: 2222
          START_SSH_SERVER: true
          LFS_START_SERVER: true
          OFFLINE_MODE: true
        database:
          DB_TYPE: postgres
          HOST: postgres-1-rw.database.svc.cluster.local:5432
          NAME: forgejo
          USER: forgejo
          SSL_MODE: disable
        repository:
          ROOT: /data/git/repositories
          DEFAULT_BRANCH: main
        service:
          DISABLE_REGISTRATION: false
          REQUIRE_SIGNIN_VIEW: true
          REGISTER_EMAIL_CONFIRM: false
          ENABLE_NOTIFY_MAIL: false
          DEFAULT_KEEP_EMAIL_PRIVATE: true
          DEFAULT_ALLOW_CREATE_ORGANIZATION: true
          DEFAULT_ENABLE_TIMETRACKING: true
          NO_REPLY_ADDRESS: noreply.${PUBLIC_DOMAIN}
        openid:
          ENABLE_OPENID_SIGNIN: false
          ENABLE_OPENID_SIGNUP: false
        session:
          PROVIDER: file
        log:
          MODE: console
          LEVEL: info
          ROUTER: console
        security:
          INSTALL_LOCK: true
          PASSWORD_HASH_ALGO: argon2
        indexer:
          REPO_INDEXER_ENABLED: true
          ISSUE_INDEXER_TYPE: bleve
        cron:
          ENABLED: true
        packages:
          ENABLED: true
        actions:
          ENABLED: false
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
    service:
      http:
        type: ClusterIP
        port: 3000
      ssh:
        type: LoadBalancer
        port: 22
        annotations:
          lbipam.cilium.io/ips: "${LB_GIT_SERVER}"
        externalTrafficPolicy: Local
    ingress:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-production
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.middlewares: "networking-traefik-middleware-chain-no-auth@kubernetescrd"
        gethomepage.dev/enabled: "true"
        gethomepage.dev/group: Services
        gethomepage.dev/name: Forgejo
        gethomepage.dev/description: Git forge
        gethomepage.dev/icon: forgejo
      hosts:
        - host: *host
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts: [*host]
          secretName: forgejo-tls
  valuesFrom:
    - targetPath: gitea.config.database.PASSWD
      kind: Secret
      name: forgejo-secret
      valuesKey: FORGEJO__database__PASSWD
    - targetPath: gitea.config.security.SECRET_KEY
      kind: Secret
      name: forgejo-secret
      valuesKey: FORGEJO__security__SECRET_KEY
    - targetPath: gitea.config.security.INTERNAL_TOKEN
      kind: Secret
      name: forgejo-secret
      valuesKey: FORGEJO__security__INTERNAL_TOKEN
    - targetPath: gitea.config.oauth2.JWT_SECRET
      kind: Secret
      name: forgejo-secret
      valuesKey: FORGEJO__oauth2__JWT_SECRET
    - targetPath: gitea.config.server.LFS_JWT_SECRET
      kind: Secret
      name: forgejo-secret
      valuesKey: FORGEJO__server__LFS_JWT_SECRET
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: forgejo
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: forgejo
              spec:
                template:
                  spec:
                    initContainers:
                      - name: init-db
                        image: ghcr.io/liana64/postgres-init:16
                        env:
                          - name: INIT_POSTGRES_DBNAME
                            value: forgejo
                          - name: INIT_POSTGRES_HOST
                            value: postgres-1-rw.database.svc.cluster.local
                          - name: INIT_POSTGRES_SUPER_PASS
                            valueFrom:
                              secretKeyRef:
                                name: cloudnative-pg-secret
                                key: password
                        envFrom:
                          - secretRef:
                              name: forgejo-secret
