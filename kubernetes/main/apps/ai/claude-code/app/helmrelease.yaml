---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app claude-code
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      claude-code:
        replicas: 1
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/liana64/claude-code
              tag: rolling
            env:
              CLAUDE_CODE_USE_BEDROCK: "0"
              CLAUDE_CONFIG_DIR: /workspace/claude
            envFrom:
              - secretRef:
                  name: claude-code-secret
            command: ["sleep", "infinity"]
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 4Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    persistence:
      claude:
        enabled: true
        existingClaim: filebrowser-claude
        globalMounts:
          - path: /workspace/claude
#      tmp:
#        type: emptyDir
#        advancedMounts:
#          claude-code:
#            app:
#              - path: /tmp
#            filebrowser:
#              - path: /tmp
