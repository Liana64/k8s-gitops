---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/volsync.backube/replicationdestination_v1alpha1.json
# Dormant by default: empty trigger value matches empty status.lastManualSync,
# so the RD will not fire until a per-app VOLSYNC_RESTORE_TRIGGER is set.
# enableFileDeletion defaults off so a misfired restore can only add files.
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: "${APP}-dst"
  labels:
    kustomize.toolkit.fluxcd.io/ssa: IfNotPresent
spec:
  trigger:
    manual: "${VOLSYNC_RESTORE_TRIGGER:=}"
  kopia:
    accessModes:
      - "${VOLSYNC_ACCESSMODES:=ReadWriteOnce}"
    cacheAccessModes:
      - "${VOLSYNC_CACHE_ACCESSMODES:=ReadWriteOnce}"
    cacheCapacity: "${VOLSYNC_CACHE_CAPACITY:=5Gi}"
    cacheStorageClassName: "${VOLSYNC_CACHE_STORAGECLASS:=openebs-hostpath}"
    capacity: "${VOLSYNC_CAPACITY:=5Gi}"
    cleanupCachePVC: true
    cleanupTempPVC: true
    copyMethod: "${VOLSYNC_COPYMETHOD:=Direct}"
    enableFileDeletion: ${VOLSYNC_FILE_DELETION:=false}
    moverSecurityContext:
      runAsUser: "${VOLSYNC_PUID:=1000}"
      runAsGroup: "${VOLSYNC_PGID:=1000}"
      fsGroup: "${VOLSYNC_PGID:=1000}"
    repository: "${APP}-volsync-secret"
    sourceIdentity:
      sourceName: "${APP}"
    storageClassName: "${VOLSYNC_STORAGECLASS:=openebs-hostpath}"
