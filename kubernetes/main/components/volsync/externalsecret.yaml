---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: "{APP}-volsync"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secrets-manager
  target:
    name: "${APP}-volsync-secret"
    template:
      engineVersion: v2
      data:
        RESTIC_REPOSITORY: "{{ .RESTIC_REPOSITORY }}"
        RESTIC_PASSWORD: "{{ .RESTIC_PASSWORD }}"
        RESTIC_REPOSITORY: "s3:https://s3.us-west-004.backblazeb2.com/<bucket>/{{ .path }}"
        AWS_ACCESS_KEY_ID: "{{ .AWS_ACCESS_KEY }}"
        AWS_SECRET_ACCESS_KEY: "{{ .AWS_SECRET_KEY }}"
  data:
    - secretKey: MAUTRIX_META_POSTGRES_USER
      remoteRef:
        key: "aafa913d-3e2c-451e-912f-b3c2000fe8c1"
    - secretKey: MAUTRIX_META_POSTGRES_PASSWORD
      remoteRef:
        key: "100f8f28-dacc-42ec-ba90-b3c2001014a6"
    - secretKey: MAUTRIX_META_POSTGRES_DB
      remoteRef:
        key: "0fd9a202-15fc-4d13-a91d-b3c200103578"
    - secretKey: META_AS_TOKEN
      remoteRef:
        key: "b358ab46-68b1-4e55-9b18-b3c200104eeb"
    - secretKey: META_HS_TOKEN
      remoteRef:
        key: "4671ebeb-5f50-4606-9a5c-b3c200106537"
    - secretKey: META_SENDER_LOCAL_PART
      remoteRef:
        key: "2ddfcd2f-87b9-48c3-bb3b-b3c20010a028"
