---
# yaml-language-server: $schema=schemas/talconfig.json

# renovate: datasource=docker depname=ghcr.io/siderolabs/installer
talosVersion: v1.12.6
# renovate: datasource=docker depname=ghcr.io/siderolabs/kubelet
kubernetesVersion: v1.35.2

clusterName: &clustername milberry

endpoint: https://172.16.4.10:6443
clusterPodNets: ["10.244.0.0/16"]
clusterSvcNets: ["10.86.0.0/16"]

additionalApiServerCertSans: &sans
  - &kubeapiip "172.16.4.10"
  - 127.0.0.1 # kubeprism
additionalMachineCertSans: *sans

nodes:
  - hostname: n1
    controlPlane: true
    ipAddress: 172.16.4.11
    installDiskSelector: &bootdisk
      size: < 200gb
    networkInterfaces:
      - interface: eth0
        dhcp: true
        vip:
          ip: *kubeapiip
      #- interface: eth1
      #  addresses:
      #    - 10.10.10.11/24
    # https://factory.talos.dev/?arch=amd64&board=undefined&bootloader=sd-boot&cmdline=-console+console%3Dtty0&cmdline-set=true&extensions=-&extensions=siderolabs%2Fqemu-guest-agent&platform=nocloud&secureboot=true&target=cloud&version=1.12.6
    talosImageURL: &talosMinimalImage factory.talos.dev/nocloud-installer-secureboot/d9cb0be10f95f364c88e92c9a695cc38373fb0f2f5ad8b612cba97d81c6b75be
    schematic: &schematicMinimal
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/qemu-guest-agent
    patches: &clusterPatches
      - |
        machine:
          kubelet:
            nodeIP:
              validSubnets:
                - 172.16.4.0/24
            extraMounts:
              - destination: /var/mnt/local-pool
                type: bind
                source: /var/mnt/local-pool
                options:
                  - bind
                  - rshared
                  - rw
          disks:
            - device: /dev/sdb
              partitions:
                - mountpoint: /var/mnt/local-pool
      - "@./patches/control/disable-admission-control.yaml"
      - "@./patches/mesh/etcd.yaml"
    nodeLabels: &ms01cluster
      hardware/manufacturer: "minisforum"
      hardware/model: "ms-01"
      node-role.kubernetes.io/control-plane: "control-plane"
      topology.kubernetes.io/region: "us-central"
      topology.kubernetes.io/zone: *clustername
  - hostname: n2
    controlPlane: true
    ipAddress: 172.16.4.12
    installDiskSelector: *bootdisk
    networkInterfaces:
      - interface: eth0
        dhcp: true
        vip:
          ip: *kubeapiip
      #- interface: eth1
      #  addresses:
      #    - 10.10.10.12/24
    # https://factory.talos.dev/?arch=amd64&bootloader=sd-boot&cmdline=-console+console%3Dtty0&cmdline-set=true&extensions=-&extensions=siderolabs%2Fnvidia-container-toolkit-lts&extensions=siderolabs%2Fqemu-guest-agent&extensions=siderolabs%2Fnonfree-kmod-nvidia-lts&platform=nocloud&secureboot=true&target=cloud&version=1.12.6
    talosImageURL: &talosNvidiaImage factory.talos.dev/nocloud-installer-secureboot/6951b9af7ee1333ba6431429e14c6f096ef257d27c82ffdfa976ff55a293b409
    schematic: &schematicNvidia
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/nonfree-kmod-nvidia-lts
            - siderolabs/nvidia-container-toolkit-lts
    patches: &nvidiaPatches
      - |
        machine:
          kubelet:
            nodeIP:
              validSubnets:
                - 172.16.4.0/24
            extraMounts:
              - destination: /var/mnt/local-pool
                type: bind
                source: /var/mnt/local-pool
                options:
                  - bind
                  - rshared
                  - rw
          disks:
            - device: /dev/sdb
              partitions:
                - mountpoint: /var/mnt/local-pool
      - "@./patches/control/disable-admission-control.yaml"
      - "@./patches/mesh/etcd.yaml"
      - "@./patches/mesh/nvidia.yaml"
    nodeLabels: *ms01cluster
  - hostname: n3
    nodeTaints:
      node-role.kubernetes.io/etcd-only: "true:NoSchedule"
    controlPlane: true
    ipAddress: 172.16.4.13
    installDiskSelector: *bootdisk
    networkInterfaces:
      - interface: eth0
        dhcp: true
        vip:
          ip: *kubeapiip
    talosImageURL: *talosMinimalImage
    schematic: *schematicMinimal
    patches: *clusterPatches
    nodeLabels:
      hardware/manufacturer: "dell"
      hardware/model: "optiplex-7050"
      node-role.kubernetes.io/control-plane: "control-plane"
      topology.kubernetes.io/region: "us-central"
      topology.kubernetes.io/zone: *clustername

patches:
  - "@./patches/global/time.yaml"
  - "@./patches/global/cluster-discovery.yaml"
  - "@./patches/global/containerd.yaml"
  - "@./patches/global/hostdns.yaml"
  - "@./patches/global/kubelet.yaml"
  - "@./patches/global/openebs.yaml"
  - "@./patches/global/sysctls.yaml"
  - "@./patches/global/luks2.yaml"

controlPlane:
  patches:
    - "@./patches/control/cluster.yaml"
    - "@./patches/control/api-access.yaml"
